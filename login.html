<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco Assist - Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #003366; }
        .login-box { background: white; padding: 40px; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { color: #003366; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #msg { color: red; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Dexco Assist</h2>
        <input type="email" id="email" placeholder="reinaldo.paulo@dex.co">
        <input type="password" id="password" placeholder="Sua Senha">
        <button onclick="entrar()">ENTRAR</button>
        <p id="msg"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Suas chaves oficiais do projeto spcpujmqnjtalupxzqpp
        const URL = 'https://spcpujmqnjtalupxzqpp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMDIzNjIsImV4cCI6MjA1NjY2MjM2Mn0.C-w6W307mXkG6rA369qD3y6m3R5y3m6m3R5y3m6m3R5y3m';
        
        const supabaseClient = supabase.createClient(URL, KEY);

        async function entrar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            
            msg.innerText = "Verificando...";

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                if (error) {
                    msg.innerText = "Erro: " + error.message;
                } else {
                    alert("Login realizado com sucesso!");
                    window.location.href = 'index.html';
                }
            } catch (e) {
                msg.innerText = "Erro de conexão.";
            }
        }
    </script>
</body>
</html>
