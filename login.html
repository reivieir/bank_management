<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco Assist - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; }
        .login-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .login-box h2 { color: #003366; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #mensagem-erro { color: red; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Dexco Assist</h2>
            <input type="email" id="email" placeholder="reinaldo.paulo@dex.co" required>
            <input type="password" id="password" placeholder="Sua Senha" required>
            <button class="btn-login" onclick="fazerLogin()">ENTRAR</button>
            <p id="mensagem-erro"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
