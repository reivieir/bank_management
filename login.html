<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco Assist - Acesso</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #003366; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { color: #003366; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        #erro { color: red; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>DEXCO ASSIST</h2>
        <p style="font-size: 14px; color: #666;">Digite a senha de acesso</p>
        <input type="password" id="campo-senha" placeholder="••••••">
        <button onclick="verificar()">ENTRAR</button>
        <p id="erro">Senha incorreta!</p>
    </div>

    <script>
        function verificar() {
            const senhaDigitada = document.getElementById('campo-senha').value;
            const msgErro = document.getElementById('erro');
            
            // Senha definida conforme seu padrão anterior
            const SENHA_MESTRA = "Dexco2026"; 

            if (senhaDigitada === SENHA_MESTRA) {
                localStorage.setItem('dexco_auth', 'true');
                window.location.href = 'index.html';
            } else {
                msgErro.style.display = 'block';
                document.getElementById('campo-senha').value = '';
            }
        }

        // Permite apertar "Enter" para entrar
        document.getElementById('campo-senha').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verificar();
        });
    </script>
</body>
</html>
