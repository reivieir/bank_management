<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Dexco Assist</title>
    <style>
        body { font-family: sans-serif; background: #003366; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 8px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; text-align: center; }
        button { width: 100%; padding: 10px; background: #0056b3; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>DEXCO ASSIST</h2>
        <input type="password" id="senha" placeholder="Digite a Senha">
        <button onclick="entrar()">ENTRAR</button>
    </div>

    <script>
        function entrar() {
            const senha = document.getElementById('senha').value;
            // Usando a senha que você definiu no seu código
            const SENHA_MESTRA = "Dexco2026"; 

            if (senha === SENHA_MESTRA) {
                localStorage.setItem('dexco_auth', 'true');
                window.location.href = 'index.html';
            } else {
                alert("Senha incorreta!");
            }
        }
    </script>
</body>
</html>
