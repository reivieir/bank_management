<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Gestão de Acessos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-box {
            background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 350px;
        }
        .login-box h2 { color: #003366; text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-login:hover { background: #002244; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Portal de Acessos</h2>
            <div class="input-group">
                <input type="email" id="email" placeholder="E-mail Corporativo" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Senha" required>
            </div>
            <button class="btn-login" onclick="fazerLogin()">ENTRAR</button>
            <p id="mensagem-erro" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
