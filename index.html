<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Dexco S.A - Gestão de Bancos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--primary:#003366;
--danger:#ff0000;
--bg:#f4f7f6;
}

body{
font-family:Arial;
margin:0;
background:var(--bg);
}

/* LOGIN */

#login-screen{
position:fixed;
inset:0;
background:var(--primary);
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
background:white;
padding:40px;
border-radius:8px;
width:300px;
text-align:center;
}

/* APP */

#app{
display:none;
}

header{
background:var(--primary);
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
}

/* MENU LATERAL */

.sidebar{
width:220px;
background:white;
border-right:1px solid #ddd;
padding:20px;
}

.bank{
cursor:pointer;
padding:8px;
border-bottom:1px solid #eee;
}

.bank:hover{
background:#f0f0f0;
}

/* CONTEUDO */

.main{
flex:1;
padding:20px;
}

.kpis{
display:flex;
gap:30px;
margin-bottom:20px;
}

.kpi-box{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 0 4px rgba(0,0,0,0.1);
}

.kpi{
font-size:30px;
color:var(--danger);
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:8px;
width:350px;
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:4px;
border:1px solid #ccc;
box-sizing:border-box;
}

.btn-main{
background:#003366;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login-screen">

<div class="login-card">

<h2 style="color:#003366">DEXCO ASSIST</h2>

<input type="password" id="pass" placeholder="Senha">

<button class="btn-main" onclick="entrar()">ENTRAR</button>

</div>

</div>

<!-- APP -->

<div id="app">

<header>
Dexco S.A - Gestão de Bancos
</header>

<div class="container">

<!-- MENU LATERAL -->

<div class="sidebar">

<h3>Bancos</h3>

<div id="lista-bancos"></div>

<hr>

<button onclick="exportar()">Exportar Excel</button>

</div>

<!-- CONTEUDO -->

<div class="main">

<div style="display:flex;justify-content:space-between">

<h2>Movimentações</h2>

<button class="btn-main" style="width:auto;padding:10px 20px" onclick="abrirModal()">
+ INCLUIR
</button>

</div>

<div class="kpis">

<div class="kpi-box">
TOTAL<br>
<span class="kpi" id="total">0</span>
</div>

<div class="kpi-box">
BANCO SELECIONADO<br>
<span class="kpi" id="total-banco">0</span>
</div>

</div>

<table>

<thead>
<tr>
<th>OPERADOR</th>
<th>PERFIL</th>
<th>USUÁRIO</th>
<th>BANCO</th>
<th>EMPRESA</th>
<th>AÇÕES</th>
</tr>
</thead>

<tbody id="corpo-tabela"></tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-content">

<h3>Cadastro</h3>

<input type="hidden" id="e-id">

<input type="text" id="i-nome" placeholder="Operador">
<input type="text" id="i-perfil" placeholder="Perfil">
<input type="text" id="i-user" placeholder="Usuário">
<input type="text" id="i-banco" placeholder="Banco">
<input type="text" id="i-empresa" placeholder="Empresa">

<button class="btn-main" style="background:#28a745" onclick="salvar()">SALVAR</button>

<button onclick="fechar()">CANCELAR</button>

</div>

</div>

<script>

const SUPABASE_URL="https://spcpujmqnjtalupxzqpp.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let dados=[]
let bancoSelecionado=null

function entrar(){

const senha=document.getElementById("pass").value

if(senha==="Dexco2026"){

localStorage.setItem("dexco_auth","ativo")
iniciar()

}else{

alert("Senha incorreta")

}

}

function iniciar(){

document.getElementById("login-screen").style.display="none"
document.getElementById("app").style.display="block"

atualizar()

}

if(localStorage.getItem("dexco_auth")==="ativo") iniciar()

async function atualizar(){

const {data,error}=await sb
.from("gestao_acessos")
.select("*")
.order("created_at",{ascending:false})

if(error){

console.error(error)
alert("Erro ao carregar dados")
return

}

dados=data

render()

}

function render(){

let lista=dados

if(bancoSelecionado){

lista=dados.filter(i=>i.banco_nome===bancoSelecionado)

}

document.getElementById("total").innerText=dados.length
document.getElementById("total-banco").innerText=lista.length

/* tabela */

document.getElementById("corpo-tabela").innerHTML=lista.map(i=>`

<tr>

<td>${i.operador_nome}</td>
<td>${i.perfil||""}</td>
<td>${i.usuario_login||""}</td>
<td>${i.banco_nome||""}</td>
<td>${i.empresa||""}</td>

<td>

<button onclick="editar('${i.id}','${i.operador_nome}','${i.perfil||""}','${i.usuario_login||""}','${i.banco_nome||""}','${i.empresa||""}')">
Editar
</button>

<button onclick="remover('${i.id}')" style="color:red;border:none;background:none;cursor:pointer">
Excluir
</button>

</td>

</tr>

`).join("")

/* bancos */

const bancos=[...new Set(dados.map(i=>i.banco_nome).filter(Boolean))]

document.getElementById("lista-bancos").innerHTML=bancos.map(b=>`

<div class="bank" onclick="filtrarBanco('${b}')">${b}</div>

`).join("")

}

function filtrarBanco(b){

bancoSelecionado=b
render()

}

/* EXPORTAR */

function exportar(){

let csv="Operador,Perfil,Usuario,Banco,Empresa\n"

dados.forEach(i=>{

csv+=`${i.operador_nome},${i.perfil},${i.usuario_login},${i.banco_nome},${i.empresa}\n`

})

const blob=new Blob([csv])
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="gestao_bancos.csv"
a.click()

}

/* CRUD original */

async function salvar(){

const id=document.getElementById("e-id").value

const obj={
operador_nome:document.getElementById("i-nome").value,
perfil:document.getElementById("i-perfil").value,
usuario_login:document.getElementById("i-user").value,
banco_nome:document.getElementById("i-banco").value,
empresa:document.getElementById("i-empresa").value
}

let resp

if(id){

resp=await sb.from("gestao_acessos").update(obj).eq("id",id)

}else{

resp=await sb.from("gestao_acessos").insert([obj])

}

if(resp.error){

alert(resp.error.message)
return

}

fechar()
atualizar()

}

function abrirModal(){

document.getElementById("modal").style.display="flex"

document.getElementById("e-id").value=""
document.getElementById("i-nome").value=""
document.getElementById("i-perfil").value=""
document.getElementById("i-user").value=""
document.getElementById("i-banco").value=""
document.getElementById("i-empresa").value=""

}

function fechar(){

document.getElementById("modal").style.display="none"

}

function editar(id,n,p,u,b,e){

abrirModal()

document.getElementById("e-id").value=id
document.getElementById("i-nome").value=n
document.getElementById("i-perfil").value=p
document.getElementById("i-user").value=u
document.getElementById("i-banco").value=b
document.getElementById("i-empresa").value=e

}

async function remover(id){

if(!confirm("Deseja excluir o registro?")) return

await sb.from("gestao_acessos").delete().eq("id",id)

atualizar()

}

</script>

</body>
</html>
