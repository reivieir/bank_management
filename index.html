<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dexco Assist - Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --dexco-blue: #003366; --red-indicator: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f6; }
        
        /* Estilo da Tela de Bloqueio */
        #tela-bloqueio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dexco-blue); display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .login-card { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        .login-card input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; text-align: center; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 10px; background: #0056b3; color: white; border: none; cursor: pointer; font-weight: bold; }

        /* Estilo do Dashboard (Escondido por padrão) */
        #dashboard { display: none; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--dexco-blue); padding-bottom: 10px; }
        .kpis { display: flex; gap: 40px; margin: 25px 0; }
        .card { font-weight: bold; font-size: 14px; }
        .red-value { color: var(--red-indicator); display: block; font-size: 32px; }
        .data-table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .data-table th { background: #f8f9fa; }
    </style>
</head>
<body>

    <div id="tela-bloqueio">
        <div class="login-card">
            <h2 style="color: var(--dexco-blue); margin: 0;">DEXCO ASSIST</h2>
            <p style="font-size: 13px; color: #666;">Digite a senha de acesso</p>
            <input type="password" id="input-senha" placeholder="••••••••">
            <button onclick="verificarSenha()">ENTRAR</button>
            <p id="erro" style="color: red; font-size: 12px; display: none; margin-top: 10px;">Senha incorreta!</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1 style="color: #333; margin: 0;">MOVIMENTAÇÕES</h1>
            <button style="padding: 10px 20px; cursor: pointer;" onclick="logout()">Sair</button>
        </div>

        <div class="kpis">
            <div class="card">TOTAL DE USUÁRIOS <span class="red-value" id="total-geral">0</span></div>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>OPERADOR</th>
                    <th>PERFIL</th>
                    <th>USUÁRIO</th>
                    <th>BANCO</th>
                    <th>DATA</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                </tbody>
        </table>
    </div>

    <script>
        // --- CONFIGURAÇÕES ---
        const SENHA_CORRETA = "Dexco2026"; //
        const URL = 'https://spcpujmqnjtalupxzqpp.supabase.co'; //
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMDIzNjIsImV4cCI6MjA1NjY2MjM2Mn0.C-w6W307mXkG6rA369qD3y6m3R5y3m6m3R5y3m6m3R5y3m'; //
        
        const _supabase = supabase.createClient(URL, KEY);

        // --- LÓGICA DE ACESSO ---
        function verificarSenha() {
            const digitada = document.getElementById('input-senha').value;
            if (digitada === SENHA_CORRETA) {
                localStorage.setItem('dexco_acesso', 'true');
                mostrarDashboard();
            } else {
                document.getElementById('erro').style.display = 'block';
            }
        }

        function mostrarDashboard() {
            document.getElementById('tela-bloqueio').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            carregarDados();
        }

        function logout() {
            localStorage.removeItem('dexco_acesso');
            location.reload();
        }

        // Verifica se já estava logado ao abrir a página
        if (localStorage.getItem('dexco_acesso') === 'true') {
            mostrarDashboard();
        }

        // --- LÓGICA DE DADOS ---
        async function carregarDados() {
            const { data, error } = await _supabase.from('gestao_acessos').select('*');
            
            if (error) {
                console.error("Erro no Supabase:", error.message);
                return;
            }

            document.getElementById('total-geral').innerText = data.length;
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = data.map(item => `
                <tr>
                    <td>${item.operador_nome || '-'}</td>
                    <td>${item.perfil || '-'}</td>
                    <td>${item.usuario_login || '-'}</td>
                    <td>${item.banco_nome || '-'}</td>
                    <td>${item.data_inclusao || '-'}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
