<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Usuários Bancos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

h1{
font-size:22px;
}

.filtros{
margin-bottom:20px;
}

input,select,button{
padding:8px;
margin-right:8px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#2f4f6f;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

button{
cursor:pointer;
}

.btn-add{
background:#2ecc71;
color:white;
border:none;
}

.btn-export{
background:#3498db;
color:white;
border:none;
}

.btn-edit{
background:#f1c40f;
border:none;
}

.btn-delete{
background:#e74c3c;
color:white;
border:none;
}

#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.popup-content{
background:white;
padding:20px;
width:400px;
margin:120px auto;
border-radius:6px;
}

.popup-content input, .popup-content select{
width:100%;
margin-bottom:10px;
}

canvas{
max-width:450px;
margin-bottom:30px;
}

</style>
</head>

<body>

<h1>Controle de Usuários Bancos</h1>

<canvas id="graficoPizza"></canvas>

<div class="filtros">

<input type="text" id="buscar" placeholder="Buscar operador">

<select id="filtroBanco">
<option value="">Todos bancos</option>
<option value="ITAU">ITAU</option>
<option value="BRADESCO">BRADESCO</option>
<option value="BB">BB</option>
<option value="SANTANDER">SANTANDER</option>
</select>

<select id="filtroPerfil">
<option value="">Todos perfis</option>
<option value="ADMIN">ADMIN</option>
<option value="OPERADOR">OPERADOR</option>
<option value="CONSULTA">CONSULTA</option>
</select>

<button class="btn-add" onclick="abrirPopup()">+ INCLUIR</button>

<button class="btn-export" onclick="exportarExcel()">EXPORTAR EXCEL</button>

</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>OPERADOR</th>
<th>BANCO</th>
<th>PERFIL</th>
<th>AÇÕES</th>
</tr>

</thead>

<tbody id="tabelaUsuarios">

</tbody>

</table>


<div id="popup">

<div class="popup-content">

<h3>Novo Usuário</h3>

<input id="nome" placeholder="Operador">

<select id="banco">
<option value="ITAU">ITAU</option>
<option value="BRADESCO">BRADESCO</option>
<option value="BB">BB</option>
<option value="SANTANDER">SANTANDER</option>
</select>

<select id="perfil">
<option value="ADMIN">ADMIN</option>
<option value="OPERADOR">OPERADOR</option>
<option value="CONSULTA">CONSULTA</option>
</select>

<button onclick="salvar()">Salvar</button>
<button onclick="fecharPopup()">Cancelar</button>

</div>

</div>

<script>

let dados = []
let grafico

function carregar(){

fetch("api.php?action=listar")
.then(r=>r.json())
.then(lista=>{

dados = lista

renderTabela()

renderGrafico()

})

}

function renderTabela(){

let busca = document.getElementById("buscar").value.toLowerCase()

let banco = document.getElementById("filtroBanco").value

let perfil = document.getElementById("filtroPerfil").value

let tbody = document.getElementById("tabelaUsuarios")

tbody.innerHTML=""

dados
.filter(u =>

(!busca || u.nome.toLowerCase().includes(busca)) &&
(!banco || u.banco==banco) &&
(!perfil || u.perfil==perfil)

)

.forEach(u=>{

tbody.innerHTML+=`

<tr>

<td>${u.id}</td>

<td>${u.nome}</td>

<td>${u.banco}</td>

<td>${u.perfil}</td>

<td>

<button class="btn-edit" onclick="editar(${u.id})">Editar</button>

<button class="btn-delete" onclick="excluir(${u.id})">Excluir</button>

</td>

</tr>

`

})

renderGrafico()

}

function renderGrafico(){

let banco = document.getElementById("filtroBanco").value

let total = dados.length

let bancoSelecionado = dados.filter(u=>u.banco==banco).length

if(!banco) bancoSelecionado=0

let outros = total - bancoSelecionado

let ctx = document.getElementById("graficoPizza")

if(grafico) grafico.destroy()

grafico = new Chart(ctx,{

type:"pie",

data:{

labels:["Banco Selecionado","Outros Bancos"],

datasets:[{

data:[bancoSelecionado,outros]

}]

}

})

}

function abrirPopup(){

document.getElementById("popup").style.display="block"

}

function fecharPopup(){

document.getElementById("popup").style.display="none"

}

function salvar(){

let nome = document.getElementById("nome").value

let banco = document.getElementById("banco").value

let perfil = document.getElementById("perfil").value

fetch("api.php?action=inserir",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({nome,banco,perfil})

})

.then(()=>{

fecharPopup()

carregar()

})

}

function excluir(id){

if(!confirm("Excluir usuário?")) return

fetch("api.php?action=excluir&id="+id)

.then(()=>carregar())

}

function editar(id){

let novo = prompt("Novo nome")

if(!novo) return

fetch("api.php?action=editar",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({id,nome:novo})

})

.then(()=>carregar())

}

function exportarExcel(){

let csv = "ID,Operador,Banco,Perfil\n"

dados.forEach(u=>{

csv += `${u.id},${u.nome},${u.banco},${u.perfil}\n`

})

let blob = new Blob([csv])

let link = document.createElement("a")

link.href = URL.createObjectURL(blob)

link.download="usuarios.csv"

link.click()

}

document.getElementById("buscar").addEventListener("input",renderTabela)
document.getElementById("filtroBanco").addEventListener("change",renderTabela)
document.getElementById("filtroPerfil").addEventListener("change",renderTabela)

carregar()

</script>

</body>
</html>
