<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Dexco S.A - Gestão de Bancos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#0f172a;
color:white;
}

.container{
display:grid;
grid-template-columns:260px 1fr;
height:100vh;
}

/* SIDEBAR */

.sidebar{
background:#020617;
padding:20px;
border-right:1px solid #1e293b;
}

.logo{
font-size:18px;
font-weight:bold;
margin-bottom:30px;
}

.banco{
padding:10px;
margin-bottom:5px;
cursor:pointer;
border-radius:4px;
}

.banco:hover{
background:#1e293b;
}

.export{
margin-top:20px;
cursor:pointer;
color:#38bdf8;
}

/* HEADER */

.header{
display:grid;
grid-template-columns:1fr 400px 200px;
gap:20px;
padding:20px;
border-bottom:1px solid #1e293b;
}

.metric{
font-size:14px;
margin-bottom:10px;
}

.metric span{
font-size:26px;
font-weight:bold;
color:#38bdf8;
}

.perfis{
display:flex;
gap:10px;
margin-top:10px;
}

.perfil-card{
background:#1e293b;
padding:10px;
border-radius:6px;
}

/* SEARCH */

.search{
padding:20px;
}

input{
padding:10px;
width:300px;
}

/* TABLE */

.table-area{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th{
background:#e2e8f0;
padding:10px;
text-align:left;
}

td{
padding:10px;
border-top:1px solid #e2e8f0;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">

Dexco S.A  
<br>
Gestão de Bancos

</div>

<div id="listaBancos"></div>

<div class="export" onclick="exportExcel()">

📤 Exportar Excel

</div>

</div>


<div>

<div class="header">

<div>

<div class="metric">
Quantidade Total
<br>
<span id="total">0</span>
</div>

<div class="metric">
Quantidade Banco Selecionado
<br>
<span id="totalBanco">0</span>
</div>

<div class="perfis" id="perfis"></div>

</div>


<div>

<canvas id="grafico"></canvas>

</div>


<div>

<div class="metric">

Usuários criados no mês

<br>

<span id="mes">0</span>

</div>

</div>

</div>


<div class="search">

<input id="busca" placeholder="Buscar operador..." onkeyup="buscar()">

</div>


<div class="table-area">

<table>

<thead>

<tr>

<th>Operador</th>
<th>Perfil</th>
<th>Usuário</th>
<th>Banco</th>
<th>Data</th>

</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

</div>

<script>

let bancoSelecionado=null

/* DADOS MOCK (depois vem do banco) */

let dados=[
{operador:"Carlos",perfil:"Master",usuario:"carlos1",banco:"Bradesco",data:"2026-03-01"},
{operador:"Ana",perfil:"Operador",usuario:"ana1",banco:"Itaú",data:"2026-03-05"},
{operador:"João",perfil:"Operador",usuario:"joao",banco:"Bradesco",data:"2026-03-10"},
{operador:"Pedro",perfil:"Consulta",usuario:"pedro",banco:"Safra",data:"2026-03-11"},
{operador:"Maria",perfil:"Master",usuario:"maria",banco:"Itaú",data:"2026-02-01"}
]

function carregar(){

renderBancos()
renderTabela()
renderMetricas()

}

function renderBancos(){

let bancos=[...new Set(dados.map(d=>d.banco))]

let html=""

bancos.forEach(b=>{

html+=`<div class="banco" onclick="filtrarBanco('${b}')">${b}</div>`

})

document.getElementById("listaBancos").innerHTML=html

}

function filtrarBanco(b){

bancoSelecionado=b

renderTabela()
renderMetricas()

}

function renderTabela(){

let lista=dados

if(bancoSelecionado){

lista=dados.filter(d=>d.banco==bancoSelecionado)

}

let busca=document.getElementById("busca").value.toLowerCase()

if(busca){

lista=lista.filter(d=>d.operador.toLowerCase().includes(busca))

}

let html=""

lista.forEach(d=>{

html+=`

<tr>

<td>${d.operador}</td>
<td>${d.perfil}</td>
<td>${d.usuario}</td>
<td>${d.banco}</td>
<td>${d.data}</td>

</tr>

`

})

document.getElementById("tabela").innerHTML=html

}

function buscar(){

renderTabela()

}

function renderMetricas(){

let total=dados.length

let lista=bancoSelecionado?
dados.filter(d=>d.banco==bancoSelecionado):dados

document.getElementById("total").innerText=total
document.getElementById("totalBanco").innerText=lista.length

/* PERFIS */

let perfis={}

lista.forEach(d=>{

perfis[d.perfil]=(perfis[d.perfil]||0)+1

})

let html=""

Object.keys(perfis).forEach(p=>{

html+=`<div class="perfil-card">${p}: ${perfis[p]}</div>`

})

document.getElementById("perfis").innerHTML=html


/* USUÁRIOS DO MÊS */

let mesAtual=new Date().getMonth()+1

let qtdMes=dados.filter(d=>{

let m=new Date(d.data).getMonth()+1

return m==mesAtual

}).length

document.getElementById("mes").innerText=qtdMes


/* GRAFICO */

let ctx=document.getElementById("grafico")

new Chart(ctx,{

type:"pie",

data:{

labels:["Total Geral","Banco Selecionado"],

datasets:[{

data:[total,lista.length]

}]

}

})

}

function exportExcel(){

let ws=XLSX.utils.json_to_sheet(dados)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"usuarios")

XLSX.writeFile(wb,"usuarios.xlsx")

}

carregar()

</script>

</body>

</html>
