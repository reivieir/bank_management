<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco Assist - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --azul: #003366; --vermelho: #ff0000; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        /* Tela de Senha */
        #bloqueio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--azul); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .box-login { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        /* Dashboard */
        #dashboard { display: none; padding: 20px; }
        .red-val { color: var(--vermelho); font-size: 32px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 350px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="bloqueio">
        <div class="box-login">
            <h2>DEXCO ASSIST</h2>
            <input type="password" id="senha-input" placeholder="Digite a Senha">
            <button onclick="tentarAcesso()" style="background: var(--azul); color: white; border: none; cursor: pointer;">ENTRAR</button>
        </div>
    </div>

    <div id="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>MOVIMENTAÇÕES</h1>
            <button onclick="abrirModal()" style="width: auto; padding: 10px 20px; cursor: pointer;">+ INCLUIR</button>
        </div>
        <p>TOTAL DE USUÁRIOS: <span class="red-val" id="total">0</span></p>
        <table>
            <thead>
                <tr>
                    <th>OPERADOR</th><th>PERFIL</th><th>USUÁRIO</th><th>BANCO</th><th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="lista-corpo"></tbody>
        </table>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="titulo-modal">Novo Cadastro</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="campo-nome" placeholder="Nome (operador_nome)">
            <input type="text" id="campo-perfil" placeholder="Perfil (perfil)">
            <input type="text" id="campo-login" placeholder="Login (usuario_login)">
            <select id="campo-banco">
                <option value="Bradesco">Bradesco</option>
                <option value="Santander">Santander</option>
                <option value="XP">XP</option>
                <option value="Itaú">Itaú</option>
            </select>
            <button onclick="salvar()" style="background: green; color: white; border: none; cursor: pointer;">SALVAR</button>
            <button onclick="fecharModal()" style="background: #666; color: white; border: none; cursor: pointer;">FECHAR</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://spcpujmqnjtalupxzqpp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMDIzNjIsImV4cCI6MjA1NjY2MjM2Mn0.C-w6W307mXkG6rA369qD3y6m3R5y3m6m3R5y3m6m3R5y3m';
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function tentarAcesso() {
            if (document.getElementById('senha-input').value === "Dexco2026") {
                localStorage.setItem('dexco_logado', 'ok');
                mostrarPainel();
            } else { alert("Senha incorreta"); }
        }

        function mostrarPainel() {
            document.getElementById('bloqueio').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            carregarTabela();
        }

        if (localStorage.getItem('dexco_logado') === 'ok') mostrarPainel();

        async function carregarTabela() {
            const { data } = await _sb.from('gestao_acessos').select('*');
            document.getElementById('total').innerText = data ? data.length : 0;
            document.getElementById('lista-corpo').innerHTML = data ? data.map(i => `
                <tr>
                    <td>${i.operador_nome}</td><td>${i.perfil}</td><td>${i.usuario_login}</td><td>${i.banco_nome}</td>
                    <td>
                        <button onclick="editar('${i.id}','${i.operador_nome}','${i.perfil}','${i.usuario_login}','${i.banco_nome}')">Alt</button>
                        <button onclick="excluir('${i.id}')" style="color:red">Excluir</button>
                    </td>
                </tr>`).join('') : '';
        }

        async function salvar() {
            const id = document.getElementById('edit-id').value;
            const payload = {
                operador_nome: document.getElementById('campo-nome').value,
                perfil: document.getElementById('campo-perfil').value,
                usuario_login: document.getElementById('campo-login').value,
                banco_nome: document.getElementById('campo-banco').value
            };
            if (id) { await _sb.from('gestao_acessos').update(payload).eq('id', id); }
            else { await _sb.from('gestao_acessos').insert([payload]); }
            fecharModal(); carregarTabela();
        }

        function abrirModal() { document.getElementById('modal').style.display='flex'; document.getElementById('edit-id').value=''; }
        function fecharModal() { document.getElementById('modal').style.display='none'; }
        function editar(id,n,p,l,b) {
            abrirModal(); document.getElementById('edit-id').value=id;
            document.getElementById('campo-nome').value=n; document.getElementById('campo-perfil').value=p;
            document.getElementById('campo-login').value=l; document.getElementById('campo-banco').value=b;
        }
        async function excluir(id) { if(confirm("Deseja excluir?")) { await _sb.from('gestao_acessos').delete().eq('id', id); carregarTabela(); } }
    </script>
</body>
</html>
