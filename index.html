<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Dexco Assist</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
}

.container{
display:grid;
grid-template-columns:250px 1fr 250px;
height:100vh;
}

.bancos{
padding:40px;
}

.bancos h3{
margin-bottom:20px;
}

.banco{
color:red;
margin:10px 0;
font-size:18px;
}

.banco span{
float:right;
}

.tabela-area{
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:#e8e8e8;
color:black;
}

th{
background:#dcdcdc;
padding:10px;
font-weight:bold;
text-transform:uppercase;
font-size:12px;
}

td{
padding:10px;
text-align:center;
}

.btn-add{
margin-top:200px;
background:#b6c1ce;
border:none;
padding:20px;
width:200px;
font-size:14px;
cursor:pointer;
}

.btn-delete{
color:red;
cursor:pointer;
border:none;
background:none;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:30px;
color:black;
width:350px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="bancos">

<h3>BANCOS</h3>

<div id="lista-bancos"></div>

</div>

<div class="tabela-area">

<table>

<thead>

<tr>
<th>OPERADOR</th>
<th>PERFIL</th>
<th>USUÁRIO</th>
<th>BANCO</th>
<th>DATA INCLUSÃO</th>
<th>AÇÃO</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<div style="padding:40px">

<button class="btn-add" onclick="abrirModal()">

INCLUIR USUÁRIO

</button>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h3>Novo Usuário</h3>

<input id="nome" placeholder="Operador">

<input id="perfil" placeholder="Perfil">

<input id="usuario" placeholder="Usuário">

<input id="banco" placeholder="Banco">

<input id="empresa" placeholder="Empresa">

<button onclick="salvar()">Salvar</button>

<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

<script>

const URL="https://spcpujmqnjtalupxzqpp.supabase.co"

const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjI3ODMsImV4cCI6MjA4ODI5ODc4M30.TYVtILJNISNR3aDejRM5fsWKt9TuIHgN1dS2deVbQwQ"

const db=supabase.createClient(URL,KEY)

let dados=[]

async function carregar(){

const {data,error}=await db.from("gestao_acessos").select("*")

if(error){

alert(error.message)

return

}

dados=data

renderTabela()

renderBancos()

}

function renderTabela(){

document.getElementById("tabela").innerHTML=

dados.map(d=>`

<tr>

<td>${d.operador_nome}</td>

<td>${d.perfil||""}</td>

<td>${d.usuario_login||""}</td>

<td>${d.banco_nome||""}</td>

<td>${d.data_inclusao||""}</td>

<td>

<button class="btn-delete"

onclick="excluir('${d.id}')">

Excluir

</button>

</td>

</tr>

`).join("")

}

function renderBancos(){

const mapa={}

dados.forEach(d=>{

if(!d.banco_nome) return

mapa[d.banco_nome]=(mapa[d.banco_nome]||0)+1

})

document.getElementById("lista-bancos").innerHTML=

Object.keys(mapa).map(b=>`

<div class="banco">

${b}

<span>${mapa[b]}</span>

</div>

`).join("")

}

async function salvar(){

const obj={

operador_nome:document.getElementById("nome").value,

perfil:document.getElementById("perfil").value,

usuario_login:document.getElementById("usuario").value,

banco_nome:document.getElementById("banco").value,

empresa:document.getElementById("empresa").value

}

await db.from("gestao_acessos").insert([obj])

fecharModal()

carregar()

}

async function excluir(id){

if(!confirm("Excluir?")) return

await db.from("gestao_acessos").delete().eq("id",id)

carregar()

}

function abrirModal(){

document.getElementById("modal").style.display="flex"

}

function fecharModal(){

document.getElementById("modal").style.display="none"

}

carregar()

</script>

</body>

</html>
