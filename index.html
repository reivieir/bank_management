<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco Assist - Gestão de Acessos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #003366; --danger: #ff0000; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        
        /* LOGIN (Lógica do FDA_BRAGA) */
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 10px; width: 320px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* DASHBOARD */
        #app-content { display: none; padding: 20px; }
        .kpi-box { color: var(--danger); font-size: 35px; font-weight: bold; margin: 10px 0; }
        
        /* TABELA E MODAL */
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-form { background: white; padding: 30px; border-radius: 8px; width: 350px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        .btn-main { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color: var(--primary); margin-bottom: 25px;">DEXCO ASSIST</h2>
            <input type="password" id="pass-field" placeholder="Digite a Senha">
            <button class="btn-main" onclick="entrar()">ENTRAR</button>
        </div>
    </div>

    <div id="app-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>MOVIMENTAÇÕES</h1>
            <button class="btn-main" style="width: auto; padding: 10px 25px;" onclick="abrirModal()">+ INCLUIR USUÁRIO</button>
        </div>

        <div>
            <p style="margin: 0; font-size: 14px; font-weight: bold;">TOTAL DE USUÁRIOS</p>
            <div class="kpi-box" id="count-val">0</div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>OPERADOR</th>
                    <th>PERFIL</th>
                    <th>USUÁRIO</th>
                    <th>BANCO</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="tabela-dados"></tbody>
        </table>
    </div>

    <div id="modal-cadastro" class="modal">
        <div class="modal-form">
            <h3 id="modal-header">Novo Cadastro</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="in-operador" placeholder="Nome do Operador">
            <input type="text" id="in-perfil" placeholder="Perfil">
            <input type="text" id="in-usuario" placeholder="Login">
            <select id="in-banco">
                <option value="Bradesco">Bradesco</option>
                <option value="Santander">Santander</option>
                <option value="XP">XP</option>
                <option value="Itaú">Itaú</option>
            </select>
            <button class="btn-main" style="background: #28a745;" onclick="confirmarSalvar()">SALVAR NO BANCO</button>
            <button onclick="fecharModal()" style="background: #eee; color: #333;">CANCELAR</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES (URL e KEY oficiais do projeto)
        const URL_SB = "https://spcpujmqnjtalupxzqpp.supabase.co";
        const KEY_SB = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMDIzNjIsImV4cCI6MjA1NjY2MjM2Mn0.C-w6W307mXkG6rA369qD3y6m3R5y3m6m3R5y3m6m3R5y3m";
        
        const _client = supabase.createClient(URL_SB, KEY_SB);

        // LÓGICA DE ACESSO (Senha fixada conforme FDA_BRAGA)
        const SENHA_MESTRA = "Dexco2026"; 

        function entrar() {
            const senhaDigitada = document.getElementById('pass-field').value;
            if (senhaDigitada === SENHA_MESTRA) {
                localStorage.setItem('dexco_v3_auth', 'permitido');
                liberarApp();
            } else {
                alert("Senha inválida!");
            }
        }

        function liberarApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            carregarTabela();
        }

        // Verifica se já está logado
        if (localStorage.getItem('dexco_v3_auth') === 'permitido') liberarApp();

        // LÓGICA DE DADOS (Exatamente como o Table Editor)
        async function carregarTabela() {
            const { data, error } = await _client.from('gestao_acessos').select('*');
            if (error) return console.error(error);

            document.getElementById('count-val').innerText = data ? data.length : 0;
            const corpo = document.getElementById('tabela-dados');
            corpo.innerHTML = data.map(i => `
                <tr>
                    <td>${i.operador_nome}</td>
                    <td>${i.perfil || '-'}</td>
                    <td>${i.usuario_login || '-'}</td>
                    <td>${i.banco_nome || '-'}</td>
                    <td>
                        <button onclick="prepararEdicao('${i.id}','${i.operador_nome}','${i.perfil}','${i.usuario_login}','${i.banco_nome}')">Alt</button>
                        <button onclick="excluirRegistro('${i.id}')" style="color:red">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        async function confirmarSalvar() {
            const id = document.getElementById('edit-id').value;
            const payload = {
                operador_nome: document.getElementById('in-operador').value,
                perfil: document.getElementById('in-perfil').value,
                usuario_login: document.getElementById('in-usuario').value,
                banco_nome: document.getElementById('in-banco').value
            };

            if (id) {
                await _client.from('gestao_acessos').update(payload).eq('id', id);
            } else {
                await _client.from('gestao_acessos').insert([payload]);
            }

            fecharModal();
            carregarTabela();
        }

        function abrirModal() {
            document.getElementById('modal-cadastro').style.display = 'flex';
            document.getElementById('modal-header').innerText = "Novo Cadastro";
            document.getElementById('edit-id').value = '';
            document.getElementById('in-operador').value = '';
        }

        function fecharModal() {
            document.getElementById('modal-cadastro').style.display = 'none';
        }

        function prepararEdicao(id, n, p, u, b) {
            abrirModal();
            document.getElementById('modal-header').innerText = "Alterar Cadastro";
            document.getElementById('edit-id').value = id;
            document.getElementById('in-operador').value = n;
            document.getElementById('in-perfil').value = p;
            document.getElementById('in-usuario').value = u;
            document.getElementById('in-banco').value = b;
        }

        async function excluirRegistro(id) {
            if (confirm("Deseja realmente excluir?")) {
                await _client.from('gestao_acessos').delete().eq('id', id);
                carregarTabela();
            }
        }
    </script>
</body>
</html>
