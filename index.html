<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco Assist - Gestão de Acessos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container" style="display: flex; height: 100vh;">
        <aside class="sidebar" style="width: 250px; border-right: 1px solid #ddd; padding: 20px;">
            <h2 style="color: #003366;">BANCOS</h2>
            <ul id="lista-bancos" style="list-style: none; padding: 0;">
                <li onclick="carregarDados('Bradesco')">Bradesco</li>
                <li onclick="carregarDados('Santander')">Santander</li>
                <li onclick="carregarDados('XP')">XP</li>
            </ul>
        </aside>

        <main class="content" style="flex: 1; padding: 20px;">
            <header style="display: flex; justify-content: space-between;">
                <h1>MOVIMENTAÇÕES</h1>
                <button onclick="document.getElementById('modal').style.display='block'" style="padding: 10px 20px; background: #d9e6f2; border: 1px solid #003366; cursor: pointer;">INCLUIR USUÁRIO</button>
            </header>

            <section class="kpis" style="display: flex; gap: 20px; margin: 20px 0;">
                <div>TOTAL: <strong id="total-geral">0</strong></div>
                <div>BANCO: <strong id="total-banco" style="color: red;">0</strong></div>
            </section>

            <table border="1" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #eee;">
                        <th>OPERADOR</th>
                        <th>PERFIL</th>
                        <th>USUÁRIO</th>
                        <th>BANCO</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </main>
    </div>

    <div id="modal" style="display:none; position: fixed; top: 20%; left: 35%; background: white; padding: 30px; border: 1px solid #000; z-index: 1000;">
        <h3>Novo Acesso</h3>
        <input type="text" id="in-usuario" placeholder="Login do Usuário"><br><br>
        <select id="in-banco">
            <option value="Bradesco">Bradesco</option>
            <option value="Santander">Santander</option>
        </select><br><br>
        <button onclick="salvarNovo()">SALVAR</button>
        <button onclick="document.getElementById('modal').style.display='none'">FECHAR</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
