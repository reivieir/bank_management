<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco Assist - Dashboard</title>
    <script>
        // TRAVA DE SEGURANÇA: Deve ser a primeira coisa no arquivo
        if (localStorage.getItem('dexco_auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        :root { --dexco-blue: #003366; --red-indicator: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 220px; border-right: 1px solid #ddd; padding: 20px; }
        .content { flex: 1; padding: 30px; background: #f9f9f9; }
        .kpis { display: flex; gap: 50px; margin: 20px 0; }
        .red-value { color: var(--red-indicator); display: block; font-size: 2.5rem; font-weight: bold; }
        .data-table { width: 100%; border-collapse: collapse; background: white; }
        .data-table th, .data-table td { border: 1px solid #ccc; padding: 12px; text-align: center; }
        .btn-sair { margin-top: 50px; cursor: pointer; color: #999; border: none; background: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 style="color: var(--dexco-blue);">BANCOS</h2>
        <ul>
            <li style="cursor:pointer; padding: 8px 0;" onclick="carregarDados('Bradesco')">Bradesco</li>
            <li style="cursor:pointer; padding: 8px 0;" onclick="carregarDados('Santander')">Santander</li>
        </ul>
        <button class="btn-sair" onclick="logout()">Sair do Sistema</button>
    </aside>

    <main class="content">
        <h1>MOVIMENTAÇÕES</h1>
        <div class="kpis">
            <div>Qtd Total Usuários <span class="red-value" id="total-geral">0</span></div>
            <div>Filtrados <span class="red-value" id="total-banco">0</span></div>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>OPERADOR</th>
                    <th>PERFIL</th>
                    <th>USUÁRIO</th>
                    <th>BANCO</th>
                    <th>AÇÃO</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Credenciais oficiais do projeto spcpujmqnjtalupxzqpp
        const URL = 'https://spcpujmqnjtalupxzqpp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMDIzNjIsImV4cCI6MjA1NjY2MjM2Mn0.C-w6W307mXkG6rA369qD3y6m3R5y3m6m3R5y3m6m3R5y3m';
        
        const _db = supabase.createClient(URL, KEY);

        async function carregarDados(banco = null) {
            let query = _db.from('gestao_acessos').select('*');
            if (banco) query = query.eq('banco_nome', banco);

            const { data, error } = await query;

            if (error) {
                console.error("Erro ao buscar dados:", error.message);
                return;
            }

            document.getElementById('total-geral').innerText = data.length;
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = data.map(item => `
                <tr>
                    <td>${item.operador_nome || '-'}</td>
                    <td>${item.perfil || '-'}</td>
                    <td>${item.usuario_login || '-'}</td>
                    <td>${item.banco_nome || '-'}</td>
                    <td><button style="color:red" onclick="alert('Bloquear ID: ${item.id}')">bloquear</button></td>
                </tr>
            `).join('');
        }

        function logout() {
            localStorage.removeItem('dexco_auth');
            window.location.href = 'login.html';
        }

        carregarDados();
    </script>
</body>
</html>
