<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Dexco Assist - Gestão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--primary:#003366;
--danger:#ff0000;
}

body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

#login-screen{
position:fixed;
inset:0;
background:var(--primary);
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.login-card{
background:white;
padding:40px;
border-radius:8px;
width:300px;
text-align:center;
}

#app{
display:none;
padding:20px;
}

.kpi{
color:var(--danger);
font-size:35px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:white;
padding:30px;
border-radius:8px;
width:350px;
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:4px;
border:1px solid #ccc;
box-sizing:border-box;
}

.btn-main{
background:var(--primary);
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div id="login-screen">
<div class="login-card">
<h2 style="color:#003366">DEXCO ASSIST</h2>

<input type="password" id="pass" placeholder="Senha">

<button class="btn-main" onclick="entrar()">ENTRAR</button>

</div>
</div>

<div id="app">

<div style="display:flex;justify-content:space-between">
<h1>MOVIMENTAÇÕES</h1>
<button class="btn-main" style="width:auto;padding:10px 20px" onclick="abrirModal()">+ INCLUIR</button>
</div>

<p>TOTAL DE USUÁRIOS: <span class="kpi" id="total">0</span></p>

<table>

<thead>
<tr>
<th>OPERADOR</th>
<th>PERFIL</th>
<th>USUÁRIO</th>
<th>BANCO</th>
<th>EMPRESA</th>
<th>AÇÕES</th>
</tr>
</thead>

<tbody id="corpo-tabela"></tbody>

</table>

</div>

<div id="modal" class="modal">

<div class="modal-content">

<h3>Cadastro</h3>

<input type="hidden" id="e-id">

<input type="text" id="i-nome" placeholder="Operador">

<input type="text" id="i-perfil" placeholder="Perfil">

<input type="text" id="i-user" placeholder="Usuário">

<input type="text" id="i-banco" placeholder="Banco">

<input type="text" id="i-empresa" placeholder="Empresa">

<button class="btn-main" style="background:#28a745" onclick="salvar()">SALVAR</button>

<button onclick="fechar()" style="background:#eee;color:#333;border:none;cursor:pointer">FECHAR</button>

</div>
</div>

<script>

const URL="https://spcpujmqnjtalupxzqpp.supabase.co"
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjI3ODMsImV4cCI6MjA4ODI5ODc4M30.TYVtILJNISNR3aDejRM5fsWKt9TuIHgN1dS2deVbQwQ"

const sb=supabase.createClient(URL,KEY)

function entrar(){

if(document.getElementById("pass").value==="Dexco2026"){

localStorage.setItem("dexco_auth","ativo")

iniciar()

}else{

alert("Senha incorreta")

}

}

function iniciar(){

document.getElementById("login-screen").style.display="none"

document.getElementById("app").style.display="block"

atualizar()

}

if(localStorage.getItem("dexco_auth")==="ativo") iniciar()

async function atualizar(){

const {data,error}=await sb
.from("gestao_acessos")
.select("*")
.order("created_at",{ascending:false})

if(error){

console.error(error)

alert(error.message)

return

}

document.getElementById("total").innerText=data.length

document.getElementById("corpo-tabela").innerHTML=data.map(i=>`

<tr>

<td>${i.operador_nome}</td>

<td>${i.perfil||""}</td>

<td>${i.usuario_login||""}</td>

<td>${i.banco_nome||""}</td>

<td>${i.empresa||""}</td>

<td>

<button onclick="editar('${i.id}','${i.operador_nome}','${i.perfil||""}','${i.usuario_login||""}','${i.banco_nome||""}','${i.empresa||""}')">

Editar

</button>

<button onclick="remover('${i.id}')" style="color:red;border:none;background:none;cursor:pointer">

Excluir

</button>

</td>

</tr>

`).join("")

}

async function salvar(){

const id=document.getElementById("e-id").value

const obj={

operador_nome:document.getElementById("i-nome").value,

perfil:document.getElementById("i-perfil").value,

usuario_login:document.getElementById("i-user").value,

banco_nome:document.getElementById("i-banco").value,

empresa:document.getElementById("i-empresa").value

}

let resp

if(id){

resp=await sb.from("gestao_acessos").update(obj).eq("id",id)

}else{

resp=await sb.from("gestao_acessos").insert([obj])

}

if(resp.error){

alert(resp.error.message)

return

}

fechar()

atualizar()

}

function abrirModal(){

document.getElementById("modal").style.display="flex"

document.getElementById("e-id").value=""

document.getElementById("i-nome").value=""

document.getElementById("i-perfil").value=""

document.getElementById("i-user").value=""

document.getElementById("i-banco").value=""

document.getElementById("i-empresa").value=""

}

function fechar(){

document.getElementById("modal").style.display="none"

}

function editar(id,n,p,u,b,e){

abrirModal()

document.getElementById("e-id").value=id

document.getElementById("i-nome").value=n

document.getElementById("i-perfil").value=p

document.getElementById("i-user").value=u

document.getElementById("i-banco").value=b

document.getElementById("i-empresa").value=e

}

async function remover(id){

if(confirm("Deseja excluir?")){

await sb.from("gestao_acessos").delete().eq("id",id)

atualizar()

}

}

</script>

</body>
</html>
