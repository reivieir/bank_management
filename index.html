<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Dexco Assist - Gestão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

header{
background:#003366;
color:white;
padding:15px 30px;
font-size:20px;
}

.container{
padding:20px;
}

.kpis{
display:flex;
gap:30px;
margin-bottom:20px;
}

.kpi{
font-size:30px;
font-weight:bold;
color:#d00000;
}

.controls{
display:flex;
gap:10px;
margin-bottom:15px;
}

input,select,button{
padding:8px;
border-radius:4px;
border:1px solid #ccc;
}

button{
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:25px;
width:350px;
border-radius:8px;
}

</style>

</head>

<body>

<header>DEXCO ASSIST - GESTÃO DE ACESSOS</header>

<div class="container">

<div class="kpis">

<div>
TOTAL USUÁRIOS<br>
<span class="kpi" id="total">0</span>
</div>

</div>

<canvas id="grafico" height="90"></canvas>

<br>

<div class="controls">

<input id="busca" placeholder="Buscar operador">

<select id="filtroBanco">
<option value="">Todos bancos</option>
</select>

<button onclick="abrirModal()">+ INCLUIR</button>

<button onclick="exportarExcel()">EXPORTAR EXCEL</button>

</div>

<table>

<thead>

<tr>
<th>Operador</th>
<th>Perfil</th>
<th>Usuário</th>
<th>Banco</th>
<th>Empresa</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>


<div class="modal" id="modal">

<div class="modal-box">

<h3>Cadastro</h3>

<input type="hidden" id="id">

<input id="nome" placeholder="Operador">

<input id="perfil" placeholder="Perfil">

<input id="usuario" placeholder="Usuário">

<input id="banco" placeholder="Banco">

<input id="empresa" placeholder="Empresa">

<br><br>

<button onclick="salvar()">Salvar</button>

<button onclick="fecharModal()">Fechar</button>

</div>

</div>

<script>

const SUPABASE_URL="https://spcpujmqnjtalupxzqpp.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjI3ODMsImV4cCI6MjA4ODI5ODc4M30.TYVtILJNISNR3aDejRM5fsWKt9TuIHgN1dS2deVbQwQ"

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let dados=[]

async function carregar(){

const {data,error}=await db.from("gestao_acessos").select("*")

if(error){
alert(error.message)
return
}

dados=data

renderTabela()
renderGrafico()
renderFiltroBanco()

}

function renderTabela(){

const busca=document.getElementById("busca").value.toLowerCase()
const banco=document.getElementById("filtroBanco").value

let filtrado=dados.filter(d=>

(d.operador_nome||"").toLowerCase().includes(busca)

)

if(banco){
filtrado=filtrado.filter(d=>d.banco_nome===banco)
}

document.getElementById("total").innerText=filtrado.length

document.getElementById("tabela").innerHTML=filtrado.map(d=>`

<tr>

<td>${d.operador_nome}</td>
<td>${d.perfil||""}</td>
<td>${d.usuario_login||""}</td>
<td>${d.banco_nome||""}</td>
<td>${d.empresa||""}</td>

<td>

<button onclick="editar('${d.id}')">Editar</button>

<button onclick="excluir('${d.id}')">Excluir</button>

</td>

</tr>

`).join("")

}

function renderFiltroBanco(){

const bancos=[...new Set(dados.map(d=>d.banco_nome).filter(Boolean))]

document.getElementById("filtroBanco").innerHTML=

'<option value="">Todos bancos</option>'+

bancos.map(b=>`<option>${b}</option>`).join("")

}

function renderGrafico(){

const mapa={}

dados.forEach(d=>{
if(!d.banco_nome) return
mapa[d.banco_nome]=(mapa[d.banco_nome]||0)+1
})

const labels=Object.keys(mapa)
const valores=Object.values(mapa)

new Chart(document.getElementById("grafico"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Usuários por Banco",
data:valores
}]
}

})

}

function abrirModal(){

document.getElementById("modal").style.display="flex"

}

function fecharModal(){

document.getElementById("modal").style.display="none"

}

async function salvar(){

const id=document.getElementById("id").value

const obj={

operador_nome:document.getElementById("nome").value,
perfil:document.getElementById("perfil").value,
usuario_login:document.getElementById("usuario").value,
banco_nome:document.getElementById("banco").value,
empresa:document.getElementById("empresa").value

}

if(id){

await db.from("gestao_acessos").update(obj).eq("id",id)

}else{

await db.from("gestao_acessos").insert([obj])

}

fecharModal()
carregar()

}

function editar(id){

const d=dados.find(x=>x.id===id)

document.getElementById("id").value=d.id
document.getElementById("nome").value=d.operador_nome
document.getElementById("perfil").value=d.perfil
document.getElementById("usuario").value=d.usuario_login
document.getElementById("banco").value=d.banco_nome
document.getElementById("empresa").value=d.empresa

abrirModal()

}

async function excluir(id){

if(!confirm("Excluir?")) return

await db.from("gestao_acessos").delete().eq("id",id)

carregar()

}

function exportarExcel(){

const ws=XLSX.utils.json_to_sheet(dados)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Acessos")

XLSX.writeFile(wb,"gestao_acessos.xlsx")

}

document.getElementById("busca").addEventListener("input",renderTabela)
document.getElementById("filtroBanco").addEventListener("change",renderTabela)

carregar()

</script>

</body>
</html>
