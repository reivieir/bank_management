<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Painel de Usuários Bancos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:30px;
}

h1{
font-size:22px;
margin-bottom:20px;
}

.filtros{
margin-bottom:20px;
}

input,select,button{
padding:8px;
margin-right:8px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#3b6ea5;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

.btnAdd{
background:#27ae60;
color:white;
border:none;
}

.btnExport{
background:#2980b9;
color:white;
border:none;
}

.btnEdit{
background:#f1c40f;
border:none;
}

.btnDelete{
background:#e74c3c;
color:white;
border:none;
}

#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.popupBox{
background:white;
width:400px;
margin:120px auto;
padding:20px;
border-radius:6px;
}

.popupBox input, .popupBox select{
width:100%;
margin-bottom:10px;
padding:8px;
}

canvas{
max-width:400px;
margin-bottom:20px;
}

</style>

</head>


<body>

<h1>Painel Usuários Bancos</h1>

<canvas id="grafico"></canvas>

<div class="filtros">

<input type="text" id="buscar" placeholder="Buscar operador">

<select id="filtroBanco">
<option value="">Todos bancos</option>
<option value="ITAU">ITAU</option>
<option value="BRADESCO">BRADESCO</option>
<option value="BB">BB</option>
<option value="SANTANDER">SANTANDER</option>
</select>

<select id="filtroPerfil">
<option value="">Todos perfis</option>
<option value="ADMIN">ADMIN</option>
<option value="OPERADOR">OPERADOR</option>
<option value="CONSULTA">CONSULTA</option>
</select>

<button class="btnAdd" onclick="abrirPopup()">+ INCLUIR</button>

<button class="btnExport" onclick="exportarExcel()">EXPORTAR EXCEL</button>

</div>


<table>

<thead>

<tr>
<th>ID</th>
<th>OPERADOR</th>
<th>BANCO</th>
<th>PERFIL</th>
<th>AÇÕES</th>
</tr>

</thead>

<tbody id="tabela">

</tbody>

</table>


<div id="popup">

<div class="popupBox">

<h3>Novo usuário</h3>

<input id="nome" placeholder="Operador">

<select id="banco">
<option value="ITAU">ITAU</option>
<option value="BRADESCO">BRADESCO</option>
<option value="BB">BB</option>
<option value="SANTANDER">SANTANDER</option>
</select>

<select id="perfil">
<option value="ADMIN">ADMIN</option>
<option value="OPERADOR">OPERADOR</option>
<option value="CONSULTA">CONSULTA</option>
</select>

<button onclick="salvar()">Salvar</button>
<button onclick="fecharPopup()">Cancelar</button>

</div>

</div>


<script>

let usuarios=[]
let grafico

function carregar(){

fetch("api.php?action=listar")

.then(r=>r.json())

.then(data=>{

usuarios=data

renderTabela()

renderGrafico()

})

}



function renderTabela(){

let busca=document.getElementById("buscar").value.toLowerCase()

let banco=document.getElementById("filtroBanco").value

let perfil=document.getElementById("filtroPerfil").value

let tbody=document.getElementById("tabela")

tbody.innerHTML=""

usuarios

.filter(u=>

(!busca || u.nome.toLowerCase().includes(busca)) &&

(!banco || u.banco==banco) &&

(!perfil || u.perfil==perfil)

)

.forEach(u=>{

tbody.innerHTML+=`

<tr>

<td>${u.id}</td>

<td>${u.nome}</td>

<td>${u.banco}</td>

<td>${u.perfil}</td>

<td>

<button class="btnEdit" onclick="editar(${u.id})">Editar</button>

<button class="btnDelete" onclick="excluir(${u.id})">Excluir</button>

</td>

</tr>

`

})

}



function renderGrafico(){

let banco=document.getElementById("filtroBanco").value

let total=usuarios.length

let bancoTotal=usuarios.filter(u=>u.banco==banco).length

if(!banco) bancoTotal=0

let outros=total-bancoTotal

let ctx=document.getElementById("grafico")

if(grafico) grafico.destroy()

grafico=new Chart(ctx,{

type:"pie",

data:{

labels:["Banco selecionado","Outros bancos"],

datasets:[{

data:[bancoTotal,outros]

}]

}

})

}



function abrirPopup(){

document.getElementById("popup").style.display="block"

}



function fecharPopup(){

document.getElementById("popup").style.display="none"

}



function salvar(){

let nome=document.getElementById("nome").value

let banco=document.getElementById("banco").value

let perfil=document.getElementById("perfil").value

fetch("api.php?action=inserir",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({nome,banco,perfil})

})

.then(()=>{

fecharPopup()

carregar()

})

}



function excluir(id){

if(!confirm("Excluir usuário?")) return

fetch("api.php?action=excluir&id="+id)

.then(()=>carregar())

}



function editar(id){

let novo=prompt("Novo nome")

if(!novo) return

fetch("api.php?action=editar",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({id,nome:novo})

})

.then(()=>carregar())

}



function exportarExcel(){

let csv="ID,Operador,Banco,Perfil\n"

usuarios.forEach(u=>{

csv+=`${u.id},${u.nome},${u.banco},${u.perfil}\n`

})

let blob=new Blob([csv])

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="usuarios.csv"

link.click()

}



document.getElementById("buscar").addEventListener("input",renderTabela)
document.getElementById("filtroBanco").addEventListener("change",renderTabela)
document.getElementById("filtroPerfil").addEventListener("change",renderTabela)


carregar()

</script>

</body>

</html>
