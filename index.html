<style>

body{

<body>

<header>
Dexco S.A - Gestão de Bancos
</header>

<div class="container">

<div class="sidebar">

<h3>Bancos</h3>

<div class="banco" onclick="filtrarBanco('Banco do Brasil')">Banco do Brasil</div>
<div class="banco" onclick="filtrarBanco('Bradesco')">Bradesco</div>
<div class="banco" onclick="filtrarBanco('CEF')">CEF</div>
<div class="banco" onclick="filtrarBanco('Itaú')">Itaú</div>
<div class="banco" onclick="filtrarBanco('Safra')">Safra</div>
<div class="banco" onclick="filtrarBanco('Santander')">Santander</div>

<div class="export" onclick="exportExcel()">
Exportar Excel
</div>

</div>

<div class="main">

<div class="dashboard">

<div>

<div>Total Geral</div>
<div class="kpi" id="totalGeral">0</div>

<div style="margin-top:10px">
Banco Selecionado
<div class="kpi" id="totalBanco">0</div>
</div>

<div class="perfis" id="perfis"></div>

</div>

<div style="width:250px">
<canvas id="grafico"></canvas>
</div>

<div>
<div>Usuários criados no mês</div>
<div class="kpi" id="mes">0</div>
</div>

</div>

<div class="barra-controle">

<input id="busca" placeholder="Buscar operador" onkeyup="buscar()">

<select id="filtroBanco" onchange="filtrarSelect()">
<option value="">Todos bancos</option>
<option>Banco do Brasil</option>
<option>Bradesco</option>
<option>CEF</option>
<option>Itaú</option>
<option>Safra</option>
<option>Santander</option>
</select>

<button class="btn" onclick="abrirModal()">+ INCLUIR</button>

<button class="btn" onclick="exportExcel()">EXPORTAR EXCEL</button>

</div>

<table>

<thead>
<tr>
<th>OPERADOR</th>
<th>PERFIL</th>
<th>USUÁRIO</th>
<th>BANCO</th>
<th>DATA INCLUSÃO</th>
<th>AÇÃO</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h3>Incluir usuário</h3>

<input id="nome" placeholder="Operador">
<input id="perfil" placeholder="Perfil">
<input id="usuario" placeholder="Usuário">
<input id="banco" placeholder="Banco">

<div class="modal-buttons">

<button class="btn-salvar" onclick="salvar()">Salvar</button>
<button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>

</div>

</div>

</div>

<script>

let dados=[
{operador:"Carlos",perfil:"Admin",usuario:"carlos1",banco:"Itaú",data:"2026-03-01"},
{operador:"Ana",perfil:"Operador",usuario:"ana2",banco:"Bradesco",data:"2026-03-05"},
{operador:"João",perfil:"Consulta",usuario:"joao1",banco:"Santander",data:"2026-03-07"},
{operador:"Pedro",perfil:"Admin",usuario:"pedro3",banco:"Itaú",data:"2026-03-08"}
]

let bancoSelecionado=""
let editIndex=null

function carregar(){
renderTabela(dados)
atualizarDashboard()
}

function renderTabela(lista){

let html=""

lista.forEach((d,i)=>{

html+=`<tr>

<td>${d.operador}</td>
<td>${d.perfil}</td>
<td>${d.usuario}</td>
<td>${d.banco}</td>
<td>${d.data}</td>

<td>

<span class="acao" onclick="editar(${i})">✏</span>
<span class="acao" onclick="remover(${i})">🗑</span>

</td>

</tr>`

})

document.getElementById("tabela").innerHTML=html

}

function buscar(){
let txt=document.getElementById("busca").value.toLowerCase()
let filtrado=dados.filter(d=>d.operador.toLowerCase().includes(txt))
renderTabela(filtrado)
}

function filtrarBanco(b){
bancoSelecionado=b
let filtrado=dados.filter(d=>d.banco==b)
renderTabela(filtrado)
atualizarDashboard()
}

function filtrarSelect(){
let banco=document.getElementById("filtroBanco").value
if(banco=="") renderTabela(dados)
else renderTabela(dados.filter(d=>d.banco==banco))
}

function atualizarDashboard(){

let total=dados.length
document.getElementById("totalGeral").innerText=total

let banco=dados.filter(d=>d.banco==bancoSelecionado)
document.getElementById("totalBanco").innerText=banco.length

let perfis={}

dados.forEach(d=>{
perfis[d.perfil]=(perfis[d.perfil]||0)+1
})

let html=""

for(let p in perfis){
html+=p+": "+perfis[p]+"<br>"
}

document.getElementById("perfis").innerHTML=html

let mes=new Date().getMonth()+1

let qtdMes=dados.filter(d=>new Date(d.data).getMonth()+1==mes)

document.getElementById("mes").innerText=qtdMes.length

graficoPizza(total,banco.length)

}

function graficoPizza(total,banco){

new Chart(document.getElementById("grafico"),{

type:"pie",

data:{
labels:["Total Geral","Banco Selecionado"],
datasets:[{data:[total,banco]}]
}

})

}

function abrirModal(){
editIndex=null
document.getElementById("modal").style.display="flex"
}

function fecharModal(){
document.getElementById("modal").style.display="none"
}

function salvar(){

let obj={
operador:document.getElementById("nome").value,
perfil:document.getElementById("perfil").value,
usuario:document.getElementById("usuario").value,
banco:document.getElementById("banco").value,
data:new Date().toISOString().split("T")[0]
}

if(editIndex!==null){
dados[editIndex]=obj
}else{
dados.push(obj)
}

fecharModal()
carregar()

}

function editar(i){

editIndex=i

let d=dados[i]

document.getElementById("nome").value=d.operador
document.getElementById("perfil").value=d.perfil
document.getElementById("usuario").value=d.usuario
document.getElementById("banco").value=d.banco

document.getElementById("modal").style.display="flex"

}

function remover(i){

if(confirm("Excluir usuário?")){
dados.splice(i,1)
carregar()
}

}

function exportExcel(){

let csv="Operador,Perfil,Usuario,Banco,Data\n"

dados.forEach(d=>{
csv+=`${d.operador},${d.perfil},${d.usuario},${d.banco},${d.data}\n`
})

let blob=new Blob([csv])
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="usuarios.csv"
a.click()

}

carregar()

</script>

</body>
</html>
