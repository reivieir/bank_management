<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Dexco - Gestão de Bancos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

header{
background:#003366;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
}

.sidebar{
width:220px;
background:white;
padding:20px;
border-right:1px solid #ddd;
}

.banco{
cursor:pointer;
padding:8px;
border-radius:4px;
}

.banco:hover{
background:#eee;
}

.export{
margin-top:20px;
color:#003366;
cursor:pointer;
font-weight:bold;
}

.main{
flex:1;
padding:20px;
}

.dashboard{
display:flex;
gap:40px;
margin-bottom:20px;
}

.kpi{
font-size:26px;
font-weight:bold;
color:#c00000;
}

.barra-controle{
display:flex;
gap:15px;
margin-bottom:15px;
}

input,select{

padding:10px;
border:1px solid #ccc;
border-radius:5px;

}

button{

padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
background:#e2e8f0;

}

table{

width:100%;
border-collapse:collapse;
background:white;

}

th,td{

padding:12px;
border:1px solid #ddd;
text-align:center;

}

th{
background:#f1f1f1;
}

.modal{

display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;

}

.modal-box{

background:white;
padding:30px;
width:350px;
border-radius:8px;

}

.modal-buttons{

display:flex;
gap:10px;
margin-top:10px;

}

.btn-salvar{
background:#28a745;
color:white;
}

.btn-cancelar{
background:#ccc;
}

.acao{

cursor:pointer;
margin:0 5px;

}

</style>

</head>

<body>

<header>

Dexco S.A - Gestão de Bancos

</header>

<div class="container">

<div class="sidebar">

<h3>Bancos</h3>

<div class="banco" onclick="filtrarBanco('')">Todos</div>

<div id="listaBancos"></div>

<div class="export" onclick="exportExcel()">

Exportar Excel

</div>

</div>

<div class="main">

<div class="dashboard">

<div>

Total Geral

<div class="kpi" id="totalGeral">0</div>

</div>

<div>

Banco Selecionado

<div class="kpi" id="totalBanco">0</div>

</div>

<div>

Usuários criados no mês

<div class="kpi" id="mes">0</div>

</div>

</div>

<div class="barra-controle">

<input id="busca" placeholder="Buscar operador" onkeyup="buscar()">

<button onclick="abrirModal()">+ INCLUIR</button>

<button onclick="exportExcel()">EXPORTAR EXCEL</button>

</div>

<table>

<thead>

<tr>

<th>OPERADOR</th>
<th>PERFIL</th>
<th>USUÁRIO</th>
<th>BANCO</th>
<th>DATA</th>
<th>AÇÃO</th>

</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h3>Cadastro</h3>

<input id="nome" placeholder="Operador">
<input id="perfil" placeholder="Perfil">
<input id="usuario" placeholder="Usuário">
<input id="banco" placeholder="Banco">

<div class="modal-buttons">

<button class="btn-salvar" onclick="salvar()">Salvar</button>

<button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>

</div>

</div>

</div>

<script>

const supabase = window.supabase.createClient(

'https://spcpujmqnjtalupxzqpp.supabase.co',

'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwY3B1am1xbmp0YWx1cHh6cXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjI3ODMsImV4cCI6MjA4ODI5ODc4M30.TYVtILJNISNR3aDejRM5fsWKt9TuIHgN1dS2deVbQwQ'

)

let dados=[]
let bancoSelecionado=""
let editId=null

async function carregar(){

const {data,error}=await supabase

.from('gestao_acessos')

.select('*')

.order('created_at',{ascending:false})

if(error){

console.log(error)

return

}

dados=data||[]

renderTabela(dados)

gerarBancos()

dashboard()

}

function renderTabela(lista){

let html=""

lista.forEach(d=>{

html+=`

<tr>

<td>${d.operador_nome}</td>

<td>${d.perfil||""}</td>

<td>${d.usuario_login||""}</td>

<td>${d.banco_nome||""}</td>

<td>${d.data_inclusao||""}</td>

<td>

<span class="acao" onclick="editar('${d.id}')">✏</span>

<span class="acao" onclick="remover('${d.id}')">🗑</span>

</td>

</tr>

`

})

document.getElementById("tabela").innerHTML=html

}

function gerarBancos(){

let bancos=[...new Set(dados.map(d=>d.banco_nome).filter(b=>b))]

let html=""

bancos.forEach(b=>{

html+=`<div class="banco" onclick="filtrarBanco('${b}')">${b}</div>`

})

document.getElementById("listaBancos").innerHTML=html

}

function buscar(){

let txt=document.getElementById("busca").value.toLowerCase()

let filtrado=dados.filter(d=>

(d.operador_nome||"").toLowerCase().includes(txt)

)

renderTabela(filtrado)

}

function filtrarBanco(b){

bancoSelecionado=b

let filtrado=b?dados.filter(d=>d.banco_nome==b):dados

renderTabela(filtrado)

dashboard()

}

function dashboard(){

document.getElementById("totalGeral").innerText=dados.length

let banco=dados.filter(d=>d.banco_nome==bancoSelecionado)

document.getElementById("totalBanco").innerText=bancoSelecionado?banco.length:0

let mesAtual=new Date().getMonth()+1

let mes=dados.filter(d=>{

let m=new Date(d.created_at).getMonth()+1

return m==mesAtual

})

document.getElementById("mes").innerText=mes.length

}

function abrirModal(){

editId=null

document.getElementById("modal").style.display="flex"

}

function fecharModal(){

document.getElementById("modal").style.display="none"

}

async function salvar(){

const obj={

operador_nome:document.getElementById("nome").value,

perfil:document.getElementById("perfil").value,

usuario_login:document.getElementById("usuario").value,

banco_nome:document.getElementById("banco").value

}

if(editId){

await supabase

.from('gestao_acessos')

.update(obj)

.eq('id',editId)

}else{

await supabase

.from('gestao_acessos')

.insert([obj])

}

fecharModal()

carregar()

}

function editar(id){

editId=id

let d=dados.find(x=>x.id==id)

document.getElementById("nome").value=d.operador_nome

document.getElementById("perfil").value=d.perfil

document.getElementById("usuario").value=d.usuario_login

document.getElementById("banco").value=d.banco_nome

abrirModal()

}

async function remover(id){

if(confirm("Excluir usuário?")){

await supabase

.from('gestao_acessos')

.delete()

.eq('id',id)

carregar()

}

}

function exportExcel(){

let csv="Operador,Perfil,Usuario,Banco,Data\n"

dados.forEach(d=>{

csv+=`${d.operador_nome},${d.perfil},${d.usuario_login},${d.banco_nome},${d.data_inclusao}\n`

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="usuarios.csv"

a.click()

}

carregar()

</script>

</body>

</html>
