<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dexco Assist - Gestão de Acessos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>BANCOS</h2>
            <ul id="lista-bancos">
                <li onclick="filtrar('Bradesco')">Bradesco</li>
                <li onclick="filtrar('Santander')">Santander</li>
                <li onclick="filtrar('XP')">XP</li>
                <li onclick="filtrar('Itaú')">Itaú</li>
                <li onclick="filtrar('Banco do Brasil')">Banco do Brasil</li>
            </ul>
            <div class="footer-sidebar">
                <a href="#">Download Relatório XLS</a>
            </div>
        </aside>

        <main class="content">
            <header>
                <h1>MOVIMENTAÇÕES</h1>
                <button class="btn-incluir" onclick="abrirModal()">INCLUIR USUÁRIO</button>
            </header>

            <section class="kpis">
                <div class="card">TOTAL GERAL: <strong id="total-geral">0</strong></div>
                <div class="card">BANCO SELECIONADO: <strong class="red" id="total-banco">0</strong></div>
                <div class="perfis" id="perfil-stats">
                    </div>
            </section>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>OPERADOR</th>
                        <th>PERFIL</th>
                        <th>USUÁRIO</th>
                        <th>BANCO</th>
                        <th>DATA INCLUSÃO</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </main>
    </div>

    <div id="modal-incluir" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Cadastrar Novo Acesso</h3>
            <input type="text" id="in-login" placeholder="Login do Usuário">
            <input type="email" id="in-gestor" placeholder="E-mail do Gestor">
            <input type="text" id="in-chamado" placeholder="Nº do Chamado">
            <button onclick="salvar()">SALVAR E NOTIFICAR GESTOR</button>
            <button onclick="fecharModal()">CANCELAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
